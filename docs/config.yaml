    - tag: sem-vis-atk
      description: >-
        搜索2025-2026年针对多模态模型的语义级视觉攻击论文。目标论文通过操纵人类可解释的视觉语义（如对象、属性、关系、场景、局部概念或细粒度图像内容）攻击VLMs、LVLMs或MLLMs。优先考虑非进化方法，生成或编辑语义视觉内容以误导模型输出，如字幕、VQA答案、识别、幻觉或视觉推理。排除主要基于OCR文本、印刷提示、隐藏指令、隐写术、代码截图、漫画、文本越狱、纯像素噪声、综述、基准或仅防御方法的论文。
